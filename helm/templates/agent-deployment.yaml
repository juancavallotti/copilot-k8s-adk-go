apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recipes.fullname" . }}-agent
  labels:
    {{- include "recipes.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: {{ .Values.agent.replicas }}
  selector:
    matchLabels:
      {{- include "recipes.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        {{- include "recipes.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      volumes:
        - name: generated-images
          emptyDir:
            sizeLimit: {{ .Values.agent.imageScratch.sizeLimit | quote }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until pg_isready -q -h {{ include "recipes.postgres.serviceName" . }} -p 5432; do
                echo "waiting for postgres"; sleep 2
              done
      containers:
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          volumeMounts:
            - name: generated-images
              mountPath: {{ .Values.agent.imageScratch.mountPath | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.agent.service.port }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          env:
            - name: AGENT_ADDR
              value: ":4100"
            - name: AGENT_MODEL
              value: {{ .Values.agent.model | quote }}
            - name: AGENT_IMAGE_MODEL
              value: {{ .Values.agent.imageModel | quote }}
            - name: AGENT_IMAGE_GENERATION_CONCURRENCY
              value: {{ .Values.agent.imageGenerationConcurrency | quote }}
            - name: AGENT_IMAGE_OUTPUT_DIR
              value: {{ .Values.agent.imageScratch.mountPath | quote }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "recipes.agent.geminiApiKeySecretName" . }}
                  key: {{ .Values.agent.geminiApiKeySecret.key | quote }}
            - name: DB_HOST
              value: {{ include "recipes.postgres.serviceName" . | quote }}
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "recipes.fullname" . }}-postgres
                  key: postgres-database
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "recipes.fullname" . }}-postgres
                  key: postgres-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "recipes.fullname" . }}-postgres
                  key: postgres-password
          {{- with .Values.agent.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
