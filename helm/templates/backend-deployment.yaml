apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recipes.fullname" . }}-backend
  labels:
    {{- include "recipes.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "recipes.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "recipes.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until pg_isready -q -h {{ include "recipes.postgres.serviceName" . }} -p 5432; do
                echo "waiting for postgres"; sleep 2
              done
      containers:
        - name: api
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          env:
            - name: API_ADDR
              value: ":4000"
            - name: DB_HOST
              value: {{ include "recipes.postgres.serviceName" . | quote }}
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "recipes.fullname" . }}-postgres
                  key: postgres-database
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "recipes.fullname" . }}-postgres
                  key: postgres-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "recipes.fullname" . }}-postgres
                  key: postgres-password
            # Embedding provider for /search. Drives which API key is
            # injected below; the Secret is shared with the agent.
            - name: EMBEDDING_PROVIDER
              value: {{ .Values.embeddingProvider | quote }}
            {{- if eq .Values.embeddingProvider "gemini" }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "recipes.agent.geminiApiKeySecretName" . }}
                  key: {{ .Values.agent.geminiApiKeySecret.key | quote }}
                  optional: true
            {{- else if eq .Values.embeddingProvider "openai" }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "recipes.agent.geminiApiKeySecretName" . }}
                  key: {{ .Values.agent.openaiApiKeySecret.key | quote }}
                  optional: true
            {{- else }}
            {{- fail (printf "embeddingProvider must be \"gemini\" or \"openai\", got %q" .Values.embeddingProvider) }}
            {{- end }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
