{{- if .Values.agent.geminiApiKeySecret.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "recipes.agent.geminiApiKeySecretName" . }}
  labels:
    {{- include "recipes.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
type: Opaque
stringData:
  {{ .Values.agent.geminiApiKeySecret.key }}: {{ required "agent.geminiApiKeySecret.value is required when agent.geminiApiKeySecret.create is true" .Values.agent.geminiApiKeySecret.value | quote }}
  {{- with .Values.agent.openaiApiKeySecret.value }}
  {{ $.Values.agent.openaiApiKeySecret.key }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.agent.anthropicApiKeySecret.value }}
  {{ $.Values.agent.anthropicApiKeySecret.key }}: {{ . | quote }}
  {{- end }}
{{- end }}
